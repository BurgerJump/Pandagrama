<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
  
<meta
name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  
  
  <title>Pandagrama</title>

<link rel="stylesheet"
href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#183f35">

</head>

<body>

<div class="game">

<h1>PANDAGRAMA 🐼</h1>

<div class="topBar">

<div class="timer">
⏳️
<span id="time">
90
</span>
</div>

<div class="score">
⭐️
<span id="score">
0
</span>
</div>

</div>

<div id="wordSlots"
class="wordSlots">

</div>

<div id="letters"
class="lettersGrid">

</div>

<div class="buttons">

<button onclick="deleteLetter()">
BORRAR
</button>

<button onclick="shuffleLetters()">
MEZCLAR
</button>

<button onclick="clearWord()">
LIMPIAR
</button>

</div>

<button
class="submitBtn"
disabled
onclick="submitWord()">

ENVIAR

</button>

<div id="message"
class="message">
</div>

<button class="restartBtn" onclick="restartGame()">

REINICIAR

</button>

</div>

<script src="script.js"></script>

</body>
</html>
